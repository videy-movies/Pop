<script>
// IKLAN
let firstClickDone = false;
let lastAdTime = 0;

function showAd() {
  const now = Date.now();

  if (!firstClickDone) {
    window.open("https://rungbeacon.com/pihwy18d?key=b11979058384d9a9aa9cb5871faa888d", "_blank");
    firstClickDone = true;
    lastAdTime = now;
    return;
  }

  if (now - lastAdTime >= 3000) {
    window.open("https://rungbeacon.com/pihwy18d?key=b11979058384d9a9aa9cb5871faa888d", "_blank");
    lastAdTime = now;
  }
}

let currentPage = 1;
const totalPages = 4;

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
}

function nextPage() {
  showAd();
  if (currentPage < totalPages) {
    currentPage++;
    showPage(currentPage);
  }
}

function prevPage() {
  showAd();
  if (currentPage > 1) {
    currentPage--;
    showPage(currentPage);
  }
}
</script>
